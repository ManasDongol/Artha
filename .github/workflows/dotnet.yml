name: Build WPF App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x # Updated for .NET 10

      - name: Restore dependencies
        run: dotnet restore ArthaInventoryManagementSystem.sln

      - name: Build application
        run: dotnet build ArthaInventoryManagementSystem.sln --configuration Release --no-restore

      - name: Publish application
        run: dotnet publish ArthaInventoryManagementSystem.sln -c Release -r win-x64 --self-contained true -o ${{ github.workspace }}/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpf-app
          path: ${{ github.workspace }}/publish